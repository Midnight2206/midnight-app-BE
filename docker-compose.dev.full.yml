name: f8-nodejs-dev-full

services:
  mysql:
    image: mysql:8.4
    container_name: f8-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Dreamer5@}
      MYSQL_DATABASE: ${DB_NAME:-midnight_app}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_full_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: f8-dev-redis-full
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_dev_full_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: node:20-bookworm-slim
    container_name: f8-dev-api
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      BACKUP_CRON_ENABLED: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Dreamer5@}
      DB_NAME: ${DB_NAME:-midnight_app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://${DB_USER:-root}:${DB_PASSWORD:-Dreamer5%40}@mysql:3306/${DB_NAME:-midnight_app}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends default-mysql-client ca-certificates && rm -rf /var/lib/apt/lists/* && npm install && npx prisma migrate deploy && npm run dev"
    volumes:
      - ./:/app
      - f8_dev_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup:
    image: node:20-bookworm-slim
    container_name: f8-dev-backup
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      BACKUP_CRON_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Dreamer5@}
      DB_NAME: ${DB_NAME:-midnight_app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://${DB_USER:-root}:${DB_PASSWORD:-Dreamer5%40}@mysql:3306/${DB_NAME:-midnight_app}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends default-mysql-client ca-certificates && rm -rf /var/lib/apt/lists/* && npm install && npm run backup:worker"
    volumes:
      - ./:/app
      - f8_dev_node_modules:/app/node_modules
      - backup_dev_full_data:/tmp/f8-backups
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    image: node:20-bookworm-slim
    container_name: f8-dev-worker
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Dreamer5@}
      DB_NAME: ${DB_NAME:-midnight_app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://${DB_USER:-root}:${DB_PASSWORD:-Dreamer5%40}@mysql:3306/${DB_NAME:-midnight_app}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run worker:dev"
    volumes:
      - ./:/app
      - f8_dev_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_dev_full_data:
  redis_dev_full_data:
  backup_dev_full_data:
  f8_dev_node_modules:
