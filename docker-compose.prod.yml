services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      BACKUP_CRON_ENABLED: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      ALLOW_ORIGIN: ${ALLOW_ORIGIN}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL}
      API_BASE_URL: https://${API_DOMAIN}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["./scripts/prod/entrypoint.sh", "node", "./backupWorker.js"]
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      BACKUP_CRON_ENABLED: "true"
      RUN_SUPERADMIN_BOOTSTRAP: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - backup_data:/tmp/f8-backups
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  backup_data:
  caddy_data:
  caddy_config:
